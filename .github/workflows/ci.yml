name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One run per ref. PR runs cancel superseded ones; pushes to main queue
# instead so an in-flight deploy is never killed halfway.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AZURE_RESOURCE_GROUP: apex-rg
  AZURE_LOCATION: francecentral

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff

      - name: Lint
        run: ruff check .

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: sk-ant-stub
          TAIGA_API_URL: https://api.taiga.io
          TAIGA_PROJECT_ID: "0"
          TAIGA_AUTH_TOKEN: stub

  test-frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  test-e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: [test-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          CI: "true"
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  test-smoke:
    name: Real-stack smoke test
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install & build frontend
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

      - name: Start real stack
        run: |
          nohup python -m uvicorn backend.app.main:app --port 8000 > backend.log 2>&1 &
          (cd frontend && nohup npm run start > ../frontend.log 2>&1 &)
        env:
          ANTHROPIC_API_KEY: sk-ant-stub
          TAIGA_API_URL: https://api.taiga.io

      - name: Smoke checks
        run: |
          set -e
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health > /dev/null && break
            [ "$i" = 30 ] && { echo "backend never came up"; exit 1; }
            sleep 2
          done
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ > /dev/null && break
            [ "$i" = 30 ] && { echo "frontend never came up"; exit 1; }
            sleep 2
          done
          # Auth wiring: a bogus token must NOT reach workspace data.
          # 401 = PM rejected it; 503 = PM unreachable from the runner. Both
          # prove validation runs; the pre-auth bug returned 200 here.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer bogus-smoke-token" \
            http://localhost:8000/api/workspace/config)
          echo "workspace/config with bogus token -> $STATUS"
          [ "$STATUS" = "401" ] || [ "$STATUS" = "503" ] || { echo "expected 401/503"; exit 1; }
          # And no token at all is rejected outright.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/workspace/config)
          [ "$STATUS" = "401" ] || { echo "expected 401 without token, got $STATUS"; exit 1; }

      - name: Print logs on failure
        if: failure()
        run: |
          echo "── backend.log ──"; cat backend.log || true
          echo "── frontend.log ──"; cat frontend.log || true

  build-backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-e2e, test-smoke]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-e2e, test-smoke]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Capture current images for rollback
        id: current
        run: |
          set -euo pipefail
          BACKEND_IMG=$(az containerapp show \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'properties.template.containers[0].image' -o tsv)
          FRONTEND_IMG=$(az containerapp show \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query 'properties.template.containers[0].image' -o tsv)
          # Fail fast: deploying without a known rollback target is worse than
          # not deploying — an empty value here would make the rollback step
          # run `az containerapp update --image ""`.
          [ -n "$BACKEND_IMG" ] || { echo "::error::could not capture current backend image"; exit 1; }
          [ -n "$FRONTEND_IMG" ] || { echo "::error::could not capture current frontend image"; exit 1; }
          echo "backend=$BACKEND_IMG" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND_IMG" >> "$GITHUB_OUTPUT"

      - name: Deploy backend
        run: |
          az containerapp update \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:sha-$(echo ${{ github.sha }} | cut -c1-7)

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:sha-$(echo ${{ github.sha }} | cut -c1-7)

      - name: Health check — backend
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${BACKEND_FQDN}/api/health" || true)
            if [ "$STATUS" = "200" ]; then echo "Backend health check passed"; exit 0; fi
            echo "Attempt $i: status=${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Backend health check failed after 2 minutes" && exit 1

      - name: Health check — frontend
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FRONTEND_FQDN}/" || true)
            if [ "$STATUS" = "200" ]; then echo "Frontend health check passed"; exit 0; fi
            echo "Attempt $i: status=${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Frontend health check failed after 2 minutes" && exit 1

      - name: Roll back on failure
        if: failure() && steps.current.outputs.backend != '' && steps.current.outputs.frontend != ''
        run: |
          echo "Deploy failed — rolling back to previous images"
          az containerapp update \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${{ steps.current.outputs.backend }}"
          az containerapp update \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${{ steps.current.outputs.frontend }}"
