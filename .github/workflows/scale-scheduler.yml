name: Apex · Scale scheduler

# Day/night cost mode (Portugal):
#   08:00 UTC  → scale UP   (frontend min=1, warm for the working day)
#   22:00 UTC  → scale DOWN (frontend → scale-to-zero overnight)
# Acceptable ±1h drift around DST transitions for an academic project.
#
# apex-backend stays min=1 max=1 AROUND THE CLOCK (never scaled to zero):
#   - max=1 because the story index and workspace config live on a shared Azure
#     File Share guarded only by a process-local lock — a second replica means
#     lost-update races (audit C1).
#   - min=1 because a cold start re-rolls the revision onto a fresh Azure SNAT
#     egress path + cold httpx pool, the daily churn behind the 2026-06-12 Taiga
#     egress incident. Keeping it warm removes that churn (~cents/mo). Only the
#     stateless frontend scales to zero overnight.
#
# Night mode can be turned OFF so the apps stay warm overnight (e.g. a late demo):
#   gh variable set APEX_NIGHT_MODE --body off   # disable the 22:00 scale-down
#   gh variable set APEX_NIGHT_MODE --body on    # re-enable (default behaviour)
# When APEX_NIGHT_MODE=off the scheduled scale-down is skipped; the 08:00
# scale-up still runs. Manual dispatch (up/down) overrides at any time.

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily → scale UP
    - cron: '0 22 * * *'  # 22:00 UTC daily → scale DOWN
  workflow_dispatch:
    inputs:
      action:
        description: 'up → day mode (backend min=1 max=1, frontend min=1 max=10)  |  down → cost mode (backend stays min=1 max=1, frontend min=0 max=2)'
        required: true
        type: choice
        options: [up, down]

env:
  AZURE_RESOURCE_GROUP: apex-rg

jobs:
  scale:
    name: Scale (${{ github.event_name == 'workflow_dispatch' && inputs.action || (github.event.schedule == '0 8 * * *' && 'up' || 'down') }})
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine action
        id: action
        env:
          NIGHT_MODE: ${{ vars.APEX_NIGHT_MODE }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 8 * * *" ]]; then
            echo "mode=up" >> "$GITHUB_OUTPUT"
          elif [[ "${NIGHT_MODE,,}" == "off" ]]; then
            echo "Night mode disabled (APEX_NIGHT_MODE=off) — skipping scheduled scale-down."
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          else
            echo "mode=down" >> "$GITHUB_OUTPUT"
          fi

      - name: Scale UP — day mode (min 1 replica)
        if: steps.action.outputs.mode == 'up'
        run: |
          az containerapp update \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 1 \
            --max-replicas 1
          az containerapp update \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 1 \
            --max-replicas 10
          echo "Scaled UP: backend → min=1 max=1 (single writer), frontend → min=1 max=10"

      - name: Scale DOWN — cost mode (frontend only)
        if: steps.action.outputs.mode == 'down'
        run: |
          # Backend stays min=1 max=1 — never scaled to zero (warm egress path,
          # single writer). Only the stateless frontend scales down overnight.
          az containerapp update \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 1 \
            --max-replicas 1
          az containerapp update \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 0 \
            --max-replicas 2
          echo "Scaled DOWN: backend → min=1 max=1 (warm, single writer), frontend → min=0 max=2"
