name: Apex · Scale scheduler

# Cost mode: both Container Apps run scale-to-zero (min=0) around the clock —
# compute is billed only while requests are being served. The frontend shows a
# "server waking up" toast during the ~30s cold start.
#
# Use the manual dispatch to pre-warm before a demo/presentation (up), and to
# return to scale-to-zero afterwards (down). No cron schedules: the daily
# min=1 day-mode was the main cost driver on the student subscription.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'up → min=1 max=10 (pre-warm for demos)  |  down → min=0 max=2 (default cost mode)'
        required: true
        type: choice
        options: [up, down]

env:
  AZURE_RESOURCE_GROUP: apex-rg

jobs:
  scale:
    name: ${{ inputs.action == 'up' && 'Scale UP (pre-warm)' || 'Scale DOWN (cost mode)' }}
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Scale UP — min 1 replica (pre-warm)
        if: inputs.action == 'up'
        run: |
          az containerapp update \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 1 \
            --max-replicas 10
          az containerapp update \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 1 \
            --max-replicas 10
          echo "Scaled UP: apex-backend + apex-frontend → min=1, max=10"

      - name: Scale DOWN — scale-to-zero (cost mode)
        if: inputs.action == 'down'
        run: |
          az containerapp update \
            --name apex-backend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 0 \
            --max-replicas 2
          az containerapp update \
            --name apex-frontend \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --min-replicas 0 \
            --max-replicas 2
          echo "Scaled DOWN: apex-backend + apex-frontend → min=0, max=2"
