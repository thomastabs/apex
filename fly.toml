app = "bolt-cli"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true

  [http_service.concurrency]
    type = "connections"
    hard_limit = 10
    soft_limit = 5

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "contextspec_data"
  destination = "/app/contextspec"

[[http_checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/_stcore/health"
  timeout = "10s"
